<!DOCTYPE html>
<html lang="th">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WRO Leaderboard 2026</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    :root {
      --wro-bg: #060810;
      --wro-gradient-top: #0c1020;
      --wro-card: rgba(22, 38, 70, 0.65);
      --wro-text-light: #f1f5f9;
      --wro-culture-blue: #26c6da; 
      --gold: #ffd700;
      
      --color-elementary: #2e7d32; 
      --color-junior: #d32f2f;     
      --color-senior: #1565c0;     
      
      --theme-active: #d32f2f; 

      /* สีพื้นหลังแถวตารางแยกตามโควตารอบสอง */
      --bg-finalist-top3: rgba(212, 175, 55, 0.22);  
      --border-finalist-top3: rgba(212, 175, 55, 0.5);
      
      --bg-finalist-top10: rgba(148, 163, 184, 0.18); 
      --border-finalist-top10: rgba(148, 163, 184, 0.35);
    }

    body {
      font-family: 'Prompt', sans-serif;
      background-color: var(--wro-bg);
      background-image: radial-gradient(circle at 50% 15%, var(--wro-gradient-top) 0%, var(--wro-bg) 75%);
      color: var(--wro-text-light);
      margin: 0;
      overflow: hidden;
      height: 100vh;
    }

    #fixed-header {
      background: linear-gradient(180deg, #090e1a 0%, #04060c 100%);
      border-bottom: 4px solid var(--theme-active);
      padding: 25px 40px 20px 40px;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,0.7);
      transition: border-color 0.5s ease;
    }

    .wro-main-title {
      font-weight: 700;
      font-size: 20px;
      letter-spacing: 4px;
      color: #64b5f6;
      margin: 0 0 8px 0;
      text-transform: uppercase;
    }

    #current-level {
      font-weight: 700;
      font-size: 68px;
      text-transform: uppercase;
      line-height: 1;
      color: #ffffff;
      text-shadow: 0 0 20px var(--theme-active);
      transition: text-shadow 0.5s ease;
      margin-bottom: 12px;
      letter-spacing: 1px;
    }

    .remark-bar {
      font-size: 17px;
      color: #94a3b8;
      background: rgba(38, 198, 218, 0.06);
      padding: 6px 30px;
      border-radius: 30px;
      border: 1px solid rgba(38, 198, 218, 0.15);
      display: inline-block;
    }
    .remark-item { margin: 0 18px; display: inline-block; }

    #table-container {
      height: calc(100vh - 265px);
      overflow-y: auto;
      padding: 15px 40px 10px 40px;
      position: relative;
    }

    .wro-table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0 12px;
      font-size: 26px;
      opacity: 0; 
      transition: opacity 0.3s ease-in-out;
    }
    
    .wro-table.visible {
      opacity: 1; 
    }

    .wro-table thead th {
      position: sticky;
      top: 0;
      background-color: var(--theme-active);
      color: #ffffff;
      padding: 18px 15px;
      font-weight: 600;
      text-align: center;
      border: none;
      text-transform: uppercase;
      font-size: 22px;
      z-index: 10;
      box-shadow: 0 6px 12px rgba(0,0,0,0.5);
      transition: background-color 0.5s ease;
    }

    .wro-table thead th:first-child { border-radius: 8px 0 0 8px; }
    .wro-table thead th:last-child { border-radius: 0 8px 8px 0; }

    .wro-table tbody tr {
      background-color: var(--wro-card);
      backdrop-filter: blur(4px);
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }

    .wro-table tbody tr.tier-finalist-top3 {
      background-color: var(--bg-finalist-top3) !important;
      box-shadow: 0 0 15px rgba(212, 175, 55, 0.15);
    }
    .wro-table tbody tr.tier-finalist-top3 td {
      border-top: 1px solid var(--border-finalist-top3) !important;
      border-bottom: 1px solid var(--border-finalist-top3) !important;
    }
    .wro-table tbody tr.tier-finalist-top3 td:first-child { border-left: 1px solid var(--border-finalist-top3) !important; }
    .wro-table tbody tr.tier-finalist-top3 td:last-child { border-right: 1px solid var(--border-finalist-top3) !important; }

    .wro-table tbody tr.tier-finalist-top10 {
      background-color: var(--bg-finalist-top10) !important;
    }
    .wro-table tbody tr.tier-finalist-top10 td {
      border-top: 1px solid var(--border-finalist-top10) !important;
      border-bottom: 1px solid var(--border-finalist-top10) !important;
    }
    .wro-table tbody tr.tier-finalist-top10 td:first-child { border-left: 1px solid var(--border-finalist-top10) !important; }
    .wro-table tbody tr.tier-finalist-top10 td:last-child { border-right: 1px solid var(--border-finalist-top10) !important; }

    .wro-table tbody td {
      padding: 15px;
      text-align: center;
      vertical-align: middle;
      border-top: 1px solid rgba(255,255,255,0.02);
      border-bottom: 1px solid rgba(255,255,255,0.02);
      white-space: nowrap;
    }

    .wro-table tbody tr td:first-child { border-left: 1px solid rgba(255,255,255,0.02); border-radius: 8px 0 0 8px; }
    .wro-table tbody tr td:last-child { border-right: 1px solid rgba(255,255,255,0.02); border-radius: 0 8px 8px 0; }

    .best-score-highlight {
      background-color: var(--theme-active) !important;
      color: #ffffff !important;
      font-weight: 700;
      box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.6);
      border-radius: 6px;
      transition: background-color 0.5s ease;
    }

    .sheet-rank-content {
      font-weight: 700;
      font-size: 28px;
    }

    .team-name {
      text-align: left !important;
      font-weight: 600;
      padding-left: 40px !important;
      color: #ffffff;
    }

    .total-score-cell {
      color: var(--wro-culture-blue);
      font-weight: 700;
    }

    #fixed-footer {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 50px;
      background: #04060c;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 30px;
      z-index: 100;
    }

    .footer-text {
      font-size: 16px;
      font-weight: 400;
      color: #64748b;
      letter-spacing: 1px;
      margin: 0;
    }

    .version-tag {
      position: absolute;
      right: 30px;
      font-size: 14px;
      color: #475569;
      background: rgba(255, 255, 255, 0.02);
      padding: 2px 10px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); }
    ::-webkit-scrollbar-thumb { background: var(--theme-active); border-radius: 3px; }
  </style>
</head>
<body>

  <div id="fixed-header">
    <p class="wro-main-title">WORLD ROBOT OLYMPIAD 2026</p>
    <div id="current-level">LOADING</div>
    <div class="remark-bar">
      <span class="remark-item">⭐ Team Rookie   ll Medal Certificate </span>
      <span class="remark-item">🥇 Gold</span>
      <span class="remark-item">🥈 Silver</span>
      <span class="remark-item">🥉 Bronze</span>
    </div>
  </div>

  <div id="table-container">
    <div class="d-flex justify-content-center align-items-center h-100">
      <div class="spinner-border text-info" style="width: 4rem; height: 4rem;" role="status"></div>
    </div>
  </div>

  <div id="fixed-footer">
    <p class="footer-text">World Robot Olympiad 2026</p>
    <span class="version-tag">v2.2.9-stable</span>
  </div>

<script>
  const APPS_SCRIPT_WEBAPP_URL = "https://script.google.com/macros/s/AKfycbw4fXGK38tBTHnfzdf2lPECD8A-6AmA3-Z5LGO5CnyOjv0tNIhfBt2Khp2TJNTLLviGSg/exec"; 

  let rankingData = {};      
  let cachedNewData = null;  
  
  const levelOrder = ['Elementary', 'Junior', 'Senior'];
  let currentIndex = 0;
  
  let loopTimeline = {
    scrollTimeout: null,
    scrollInterval: null,
    pageSwitchTimeout: null
  };

  const levelColors = {
    'Elementary': '#2e7d32', 
    'Junior': '#d32f2f',     
    'Senior': '#1565c0'      
  };

  function clearAllActiveTimers() {
    if (loopTimeline.scrollTimeout) clearTimeout(loopTimeline.scrollTimeout);
    if (loopTimeline.scrollInterval) clearInterval(loopTimeline.scrollInterval);
    if (loopTimeline.pageSwitchTimeout) clearTimeout(loopTimeline.pageSwitchTimeout);
  }

  function fetchInitialData() {
    if (typeof google !== 'undefined' && google.script && google.script.run) {
      google.script.run.withSuccessHandler(function(data) {
        rankingData = data;
        showTable(levelOrder[currentIndex]);
      }).getRankingData();
    } else {
      fetch(`${APPS_SCRIPT_WEBAPP_URL}?api=true`)
        .then(response => response.json())
        .then(data => {
          rankingData = data;
          showTable(levelOrder[currentIndex]);
        })
        .catch(err => {
          document.getElementById('table-container').innerHTML = `<p class="text-center text-danger pt-5">Error API Connection: ${err.message}</p>`;
        });
    }
  }

  function fetchUpdatesInBackground() {
    if (typeof google !== 'undefined' && google.script && google.script.run) {
      google.script.run.withSuccessHandler(function(data) {
        cachedNewData = data; 
      }).getRankingData();
    } else {
      fetch(`${APPS_SCRIPT_WEBAPP_URL}?api=true`)
        .then(response => response.json())
        .then(data => {
          cachedNewData = data; 
        })
        .catch(err => console.log("Background fetch update paused: ", err));
    }
  }

  function showTable(level) {
    const activeColor = levelColors[level] || '#d32f2f';
    document.documentElement.style.setProperty('--theme-active', activeColor);
    document.getElementById('current-level').innerText = level;

    const rows = rankingData[level];
    if (!rows || rows.length === 0) {
      document.getElementById('table-container').innerHTML = '<p class="text-center text-muted pt-5">ไม่มีข้อมูลการแข่งขันในระดับนี้</p>';
      loopTimeline.pageSwitchTimeout = setTimeout(moveToNextPage, 5000);
      return;
    }

    let isRound2CompletedAllTeams = true;
    let validTeamsCount = 0;

    rows.forEach(row => {
      let teamId = row[1];
      let score2 = row[4];

      if (teamId !== "" && teamId !== undefined && teamId !== null) {
        validTeamsCount++;
        if (score2 === "" || score2 === undefined || score2 === null || score2 === "-") {
          isRound2CompletedAllTeams = false;
        }
      }
    });

    if (validTeamsCount === 0) {
      isRound2CompletedAllTeams = false;
    }

    let html = `<table id="leaderboard-table" class="wro-table">
      <thead>
        <tr>
          <th style="width: 10%;">Medal</th>
          <th style="width: 12%;">Team ID</th>
          <th style="width: 38%;">Team Name</th>
          <th style="width: 13%;">Round 1</th>
          <th style="width: 13%;">Round 2</th>
          <th style="width: 14%;">Best Score</th>
        </tr>
      </thead>
      <tbody>`;

    rows.forEach((row, index) => {
      let rankFromSheet = row[0]; 
      let teamId = row[1];
      let teamName = row[2];
      let score1 = row[3];
      let score2 = row[4];
      let totalScore = row[5];

      let rankContent = `<span class="sheet-rank-content">${rankFromSheet ?? ''}</span>`;

      let score1Class = "";
      let score2Class = "";
      if (totalScore !== "" && totalScore !== undefined && totalScore !== null) {
        if (score1 == totalScore) {
          score1Class = "best-score-highlight";
        } 
        else if (score2 == totalScore) {
          score2Class = "best-score-highlight";
        }
      }

      let rowTierClass = "";
      if (isRound2CompletedAllTeams) {
        if (index >= 0 && index <= 2) {
          rowTierClass = "tier-finalist-top3";  
        } else if (index >= 3 && index <= 9) {
          rowTierClass = "tier-finalist-top10"; 
        }
      }

      html += `<tr class="${rowTierClass}">
        <td>${rankContent}</td>
        <td><span class="text-info">${teamId}</span></td>
        <td class="team-name">${teamName}</td>
        <td class="${score1Class}">${score1 ?? '-'}</td>
        <td class="${score2Class}">${score2 ?? '-'}</td>
        <td class="total-score-cell">${totalScore ?? '0'}</td>
      </tr>`;
    });

    html += '</tbody></table>';
    const container = document.getElementById('table-container');
    container.innerHTML = html;

    const targetTable = document.getElementById('leaderboard-table');
    
    // 🛡️ [แก้บั๊กโหลดช้า v2.2.9] รอให้เบราว์เซอร์เตรียมโครงสร้างข้อมูลตารางเสร็จสมบูรณ์ก่อน ค่อยเลื่อนไปล่างสุด
    requestAnimationFrame(() => {
      container.scrollTop = container.scrollHeight; 
      
      setTimeout(() => {
        if(targetTable) {
          targetTable.classList.add('visible');
        }
        // เมื่อวาร์ปมาอยู่ด้านล่างสุดเรียบร้อยแล้ว ให้จอดนิ่งค้างไว้ก่อน 15 วินาที แล้วค่อย ๆ เริ่มสกรอลล์ขึ้นไปด้านบน
        loopTimeline.scrollTimeout = setTimeout(executeScrollUp, 10000);
      }, 100);
    });
  }

  // ปล่อยให้ระบบสกรอลล์ขึ้นด้านบนหาอันดับ 1
  function executeScrollUp() {
    const container = document.getElementById('table-container');
    const stepPixels = 1;
    const speedMs = 35; // ความเร็วของการเลื่อนตารางขึ้นด้านบน

    loopTimeline.scrollInterval = setInterval(() => {
      if (container.scrollTop > 0) {
        container.scrollTop -= stepPixels;
      } else {
        clearInterval(loopTimeline.scrollInterval);
        // เมื่อวิ่งขึ้นมาถึงด้านบนสุด (โชว์อันดับ 1-10 และเหรียญรางวัล) ค้างหน้าจอไว้ 15 วินาทีให้ทุกคนได้ชื่นชม แล้วค่อยเปลี่ยนหน้า
        loopTimeline.pageSwitchTimeout = setTimeout(moveToNextPage, 10000);
      }
    }, speedMs);
  }

  function moveToNextPage() {
    clearAllActiveTimers();
    
    if (cachedNewData !== null) {
      rankingData = cachedNewData;
      cachedNewData = null; 
      console.log("Background Cache Sync Completed.");
    }

    currentIndex = (currentIndex + 1) % levelOrder.length;
    showTable(levelOrder[currentIndex]);
  }

  fetchInitialData();
  setInterval(fetchUpdatesInBackground, 90000);
</script>

</body>
</html>
